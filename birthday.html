<!DOCTYPE html>
<html>
<head>
<title>Birthday Game</title>

<style>

body{
margin:0;
font-family:Arial;
overflow:hidden;
background:linear-gradient(#ffd6ec,#ffc2e2,#ffb6dc);
text-align:center;
}

/* screens */

.screen{
position:absolute;
width:100%;
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

/* start screen */

#startScreen h1{
font-size:50px;
color:#ff1493;
text-shadow:0 0 10px white;
}

button{
padding:15px 35px;
font-size:20px;
border:none;
border-radius:20px;
background:#ff69b4;
color:white;
cursor:pointer;
box-shadow:0 0 15px pink;
}

/* game screen */

#gameScreen{
display:none;
}

#score{
font-size:24px;
color:#ff1493;
margin-top:20px;
}

/* hearts */

.heart{
position:absolute;
width:50px;
cursor:pointer;
}

/* clouds */

.cloud{
position:absolute;
font-size:60px;
opacity:0.6;
animation:cloudMove linear infinite;
}

@keyframes cloudMove{
0%{transform:translateX(-200px);}
100%{transform:translateX(120vw);}
}

/* sparkles */

.spark{
position:absolute;
animation:spark 1s linear forwards;
}

@keyframes spark{
0%{transform:scale(1);opacity:1;}
100%{transform:scale(2);opacity:0;}
}

/* ending screen */

#endScreen{
display:none;
background:linear-gradient(#ffd6ec,#ffc2e2,#ffb6dc);
}

#endScreen h1{
font-size:45px;
color:#ff1493;
}

</style>

<script>

let score=0;

/* start game */

function startGame(){

document.getElementById("startScreen").style.display="none";
document.getElementById("gameScreen").style.display="flex";

}

/* create hearts */

function createHeart(){

const heart=document.createElement("img");

heart.src="heart3.png";
heart.className="heart";

heart.style.left=Math.random()*100+"vw";
heart.style.top="-60px";

document.body.appendChild(heart);

let pos=0;

let fall=setInterval(()=>{

pos+=2;
heart.style.top=pos+"px";

if(pos>window.innerHeight){

heart.remove();
clearInterval(fall);

}

},20);

/* click heart */

heart.onclick=function(){

score++;

document.getElementById("score").innerHTML="Hearts: "+score;

sparkle(heart);

heart.remove();

if(score>=20){

win();

}

};

}

/* sparkle effect */

function sparkle(el){

for(let i=0;i<6;i++){

let s=document.createElement("div");

s.className="spark";
s.innerHTML="✨";

s.style.left=el.style.left;
s.style.top=el.style.top;

document.body.appendChild(s);

setTimeout(()=>s.remove(),1000);

}

}

/* clouds */

function cloud(){

const c=document.createElement("div");

c.className="cloud";
c.innerHTML="☁️";

c.style.top=Math.random()*200+"px";
c.style.animationDuration=(Math.random()*20+20)+"s";

document.body.appendChild(c);

setTimeout(()=>c.remove(),40000);

}

/* win screen */

function win(){

document.getElementById("gameScreen").style.display="none";
document.getElementById("endScreen").style.display="flex";

document.getElementById("music").play();

}

/* loops */

setInterval(createHeart,1000);
setInterval(cloud,5000);

</script>

</head>

<body>

<!-- START SCREEN -->

<div class="screen" id="startScreen">

<h1>💗 Birthday Game 💗</h1>

<p>Collect hearts to unlock the birthday surprise!</p>

<button onclick="startGame()">🎮 Start Game</button>

</div>

<!-- GAME SCREEN -->

<div class="screen" id="gameScreen">

<h2 id="score">Hearts: 0</h2>

<p>Collect 20 hearts 💖</p>

</div>

<!-- END SCREEN -->

<div class="screen" id="endScreen">

<h1>🎉 Happy Birthday Vaishuu🎂</h1>

<p> Since you are seet and adorable here is a cake. 💖</p>
<p>Love you loads Vaishu have a good year ahead and live to the fullest</p>

<div style="font-size:90px">🎂</div>

</div>

<audio id="music">
<source src="song.mp3" type="audio/mpeg">
</audio>

</body>
</html>
